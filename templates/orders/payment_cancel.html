{% extends 'base.html' %}
{% block title %}Payment Cancelled | PC Customization Shop{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card shadow-sm">
                <div class="card-body p-5">
                    <div class="mb-4">
                        <i class="fas fa-times-circle text-danger fa-5x"></i>
                    </div>
                    <h2 class="mb-4">Payment Cancelled</h2>
                    <p class="text-muted mb-4">
                        Your payment has been cancelled. If you have any questions, please contact our support team.
                    </p>
                    <div class="d-grid gap-2">
                        <a href="{% url 'orders:order_list' %}" class="btn btn-primary">
                            View Orders
                        </a>
                        <a href="{% url 'products:home' %}" class="btn btn-outline-primary">
                            Continue Shopping
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
