{% extends 'base.html' %}
{% block title %}Complete Payment | PC Customization Shop{% endblock %}

{% block content %}
<div class="container py-5 text-center">
    <h3>Completing Payment...</h3>
    <p>Please wait while we open the payment gateway.</p>

    <!-- Razorpay Button (Hidden or Auto-clicked) -->
    <button id="rzp-button1" class="btn btn-primary" style="display:none;">Pay with Razorpay</button>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
    var options = {
        "key": "{{ razorpay_merchant_key }}", // Enter the Key ID generated from the Dashboard
        "amount": "{{ razorpay_amount }}", // Amount is in currency subunits. Default currency is INR.
        "currency": "{{ currency }}",
        "name": "PC Customization Shop",
        "description": "Order Payment #{{ order.id }}",
        "image": "/static/images/logo.png",
        "order_id": "{{ razorpay_order_id }}", // This is the order_id created in the backend
        "callback_url": "{{ callback_url }}",
        "prefill": {
            "name": "{{ order.user.get_full_name }}",
            "email": "{{ order.user.email }}",
            "contact": "{{ order.user.phone_number }}"
        },
        "theme": {
            "color": "#3399cc"
        }
    };
    var rzp1 = new Razorpay(options);
    rzp1.on('payment.failed', function (response) {
        alert(response.error.description);
        window.location.href = "{% url 'orders:payment_cancel' %}";
    });
    // Automatically open checkout
    window.onload = function () {
        rzp1.open();
        document.getElementById('rzp-button1').style.display = 'block';

        document.getElementById('rzp-button1').onclick = function (e) {
            rzp1.open();
            e.preventDefault();
        }
    };
</script>
{% endblock %}
