{% extends 'base.html' %}
{% block title %}Password Reset Complete | PC Customization Shop{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0 rounded-lg">
                <div class="card-header bg-primary text-white text-center py-4">
                    <h3 class="mb-0 fw-bold">Password Reset Complete</h3>
                </div>
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-check-circle fa-3x text-success mb-3"></i>
                    </div>
                    <p class="text-center">Your password has been set. You may go ahead and log in now.</p>
                    <div class="d-grid">
                        <a href="{% url 'accounts:login' %}" class="btn btn-primary btn-lg">Log In</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
